name: Package and Release Skill

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  package-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package skill
        run: |
          zip -r swiftui-expert.skill \
            SKILL.md \
            references/ \
            .claude-plugin/ \
            README.md \
            LICENSE \
            -x "*.git*"
          ls -lh swiftui-expert.skill

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: swiftui-expert.skill
          generate_release_notes: true
          body: |
            ## SwiftUI Expert Skill

            Write, review, or improve SwiftUI code following best practices for state management, view composition, performance, accessibility, and modern APIs including iOS 26 Liquid Glass.

            ### Installation

            **Claude Code / skills CLI (recommended):**
            ```bash
            npx skills add SwiftyJourney/swiftui-expert-skill
            ```

            **Manual:**
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            ```

            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for full details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: swiftui-expert-skill
          path: swiftui-expert.skill
